---

{{ if .Vars.rhel10cis_level_2 }}
  {{ if .Vars.rhel10cis_rule_6_3_3_3 }}
command:
  auditd_sudolog_cnf:
    title: 6.3.3.3 | Ensure events that modify the sudo log file are collected | conf_check
    exec: grep sudo_log /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '/-a always,exit -F arch=b64 -S all -F path=/var/log/sudo.log -F perm=wa -F key=sudo_log_file/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.3
      CISv8: 8.5
      CISv8_IG1: false
      CISv8_IG2: true
      CISv8_IG3: true
  auditd_sudolog_live:
    title: 6.3.3.3 | Ensure events that modify the sudo log file are collected | running
    exec: auditctl -l | grep -Ps -- 'sudo.log'
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S all -F path=/var/log/sudo.log -F perm=wa -F key=sudo_log_file'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.3
      CISv8: 8.5
      CISv8_IG1: false
      CISv8_IG2: true
      CISv8_IG3: true
  {{ end }}
{{ end }}
