---

{{ if .Vars.rhel10cis_level_2 }}
  {{ if .Vars.rhel10cis_rule_6_3_3_22 }}
command:
  auditd_sessions_cnf:
    title: 6.3.3.22 | Ensure session initiation information is collected | conf check
    exec: grep session /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '-w /var/run/utmp -p wa -k session'
    - '-w /var/log/wtmp -p wa -k session'
    - '-w /var/log/btmp -p wa -k session'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.22
      NIST800-53R5:
      - AU-3
  auditd_session_live:
    title: 6.3.3.22 | Ensure session initiation information is collected | running
    exec: auditctl -l | grep session
    exit-status: 0
    stdout:
    - '-w /var/run/utmp -p wa -k session'
    - '-w /var/log/wtmp -p wa -k session'
    - '-w /var/log/btmp -p wa -k session'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.22
      NIST800-53R5:
      - AU-3
  {{ end }}
{{ end }}
