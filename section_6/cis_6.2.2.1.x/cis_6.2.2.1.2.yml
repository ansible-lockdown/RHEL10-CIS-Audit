---

{{ if .Vars.rhel10cis_level_1 }}
  {{ if .Vars.rhel10cis_rule_6_2_2_1_2 }}
    {{ if eq .Vars.rhel10cis_syslog "journald" }}
file:
  journald_remote_config:
    title: 6.2.2.1.2 | Ensure systemd-journal-upload authentication is configured
    path: /etc/systemd/journal-upload.conf
    exists: true
    contents:
    - '/^URL=/'
    - '/ServerKeyFile=.*.pem'
    - '/ServerCertificateFile=.*.pem'
    - '/TrustedCertificateFile=.*.pem'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 6.2.2.1.2
      NIST800-53R5:
      - AU-2
      - AU-12
    {{ end }}
  {{ end }}
{{ end }}
