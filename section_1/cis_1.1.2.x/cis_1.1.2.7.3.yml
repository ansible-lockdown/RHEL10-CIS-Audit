---

{{ if .Vars.rhel10cis_level_1 }}
  {{ if .Vars.rhel10cis_rule_1_1_2_7_3 }}
mount:
  var_log_audit_nosuid_options:
    title: 1.1.2.7.3 | Ensure nosuid option set on /var/log/audit partition
    mountpoint: '/var/log/audit'
    exists: true
    opts:
    - nosuid
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.2.7.3
      NIST800-53R5:
      - AC-3
      - MP-2
file:
  var_log_audit_nosuid_fstab_options:
    title: 1.1.2.7.3 | Ensure nosuid option set on /var/log/audit partition
    exists: true
    path: /etc/fstab
    contents:
    - '/\s\/var\/log\/audit\s.*nosuid/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.2.7.3
      NIST800-53R5:
      - AC-3
      - MP-2
  {{ end }}
{{ end }}
