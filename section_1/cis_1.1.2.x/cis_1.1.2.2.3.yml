---

{{ if .Vars.rhel10cis_level_1 }}
  {{ if .Vars.rhel10cis_rule_1_1_2_2_3 }}
mount:
  dev_shm_nosuid_options:
    title: 1.1.2.2.3 | Ensure nosuid option set on /dev/shm partition
    mountpoint: /dev/shm
    exists: true
    opts:
    - nosuid
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.2.2.3
      NIST800-53R5:
      - CM-7
      CCI: 001764
file:
  dev_shm_nosuid_fstab_options:
    title: 1.1.2.2.3 | Ensure nosuid option set on /dev/shm partition
    exists: true
    path: /etc/fstab
    contents:
    - '/\s\/dev\/shm.*nosuid/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.2.2.3
      NIST800-53R5:
      - CM-7
      CCI: 001764
  {{ end }}
{{ end }}
