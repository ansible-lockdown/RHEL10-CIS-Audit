---

{{ if not .Vars.rhel10cis_gui }}
  {{ if .Vars.rhel10cis_level_1 }}
    {{ if .Vars.rhel10cis_rule_1_8_4 }}
file:
  60-automount:
    title: 1.8.4 | Ensure GDM automount is configured
    path: /etc/dconf/db/local.d/60-media-automount
    exists: true
    contents:
    - '/^[org/gnome/desktop/media-handling]/'
    - '/^automount=false/'
    - '/^automount-open=false/'
    - '/^automount=true/'
    - '/^automount-open=true/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.8.4
      NIST800-53R5: IA-3
      CCI:
      - 000078
      - 001958
  60-automount-locks:
    title: 1.8.4 | Ensure GDM automount is configured | locks
    path: /etc/dconf/db/local.d/locks/60-media-automount
    exists: true
    contents:
    - '/org/gnome/desktop/media-handling/automount'
    - '/org/gnome/desktop/media-handling/automount-open'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.8.4
      NIST800-53R5: IA-3
      CCI:
      - 000078
      - 001958
    {{ end }}
  {{ end }}
{{ end }}
