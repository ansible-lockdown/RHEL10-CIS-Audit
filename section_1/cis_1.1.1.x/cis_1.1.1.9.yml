---

{{ if .Vars.rhel10cis_level_1 }}
  {{ if .Vars.rhel10cis_rule_1_1_1_9 }}
command:
  cve_fs:
    title: 1.1.1.9 | Ensure unused filesystems kernel modules are not available
    exit-status: 0
    exec: "/var/fs_with_cves.sh"
    stdout:
    - '!/.*<- CVE exists!/'
    meta:
      server: 1
      workstation: 2
      CIS_ID: 1.1.1.9
      CISv8:
      - 4.8
      CISv8_IG1: false
      CISv8_IG2: true
      CISv8_IG3: true
      NIST800-53R5: NA
  {{ end }}
{{ end }}
