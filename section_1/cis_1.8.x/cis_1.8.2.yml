---

{{ if .Vars.desktop_required }}
  {{ if .Vars.rhel10cis_level_1 }}
    {{ if .Vars.rhel10cis_rule_1_8_2 }}
command:
  gdm_last_login:
    title: 1.8.2 | Ensure GDM disable-user-list is configured | user
    exec: cat /etc/dconf/profile/user
    exit-status: 0
    stdout:
    - '/^user-db:user/'
    - '/^system-db:local/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.8.2
      NIST800-53R5: CM-6
      CCI:
      - 000366
  gdm_disable_user:
    title: 1.8.2 | Ensure GDM disable-user-list is configured | config
    exec: grep "[org/gnome/login-screen]" /etc/dconf/db/local.d/60-login-screen | grep disable-user-list
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - '/^disable-user-list=true/'
    - '!/^disable-user-list=false/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.8.2
      NIST800-53R5: CM-6
      CCI:
      - 000366
  gdm_disable_user_locks:
    title: 1.8.2 | Ensure GDM disable-user-list is configured | locks
    exec: grep disable-user-list /etc/dconf/db/local.d/locks/60-login-screen | grep disable-user-list
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - '/org/gnome/login-screen/disable-user-list'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.8.2
      NIST800-53R5: CM-6
      CCI:
      - 000366
    {{ end }}
  {{ end }}
{{ end }}
