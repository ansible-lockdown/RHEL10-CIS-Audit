---

{{ if .Vars.rhel10cis_level_1 }}
  {{ if .Vars.rhel10cis_rule_2_1_4 }}
    {{ if not .Vars.rhel10cis_dhcp_server }}
      {{ if not .Vars.rhel10cis_dhcp_mask }}
package:
  dhcp_pkg:
    title: 2.1.4 | Ensure dhcp server services are not in use | pkg removed
    name: dhcp-server
    installed: false
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.4
      NIST800-53R5:
      - CM-7
      {{ end }}
      {{ if .Vars.rhel10cis_dhcp_mask }}
file:
  dhcp4_service_masked:
    title: 2.1.4 | Ensure dhcp server services are not in use | masked
    path: /etc/systemd/system/kea-dhcp4.service
    exists: true
    filetype: symlink
    linked-to: /dev/null
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.4
      NIST800-53R5:
      - CM-7
  dhcp6_service_masked:
    title: 2.1.4 | Ensure dhcp server services are not in use | masked
    path: /etc/systemd/system/kea-dhcp6.service
    exists: true
    filetype: symlink
    linked-to: /dev/null
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.4
      NIST800-53R5:
      - CM-7
  ddns_service_masked:
    title: 2.1.4 | Ensure dhcp server services are not in use | masked
    path: /etc/systemd/system/kea-dhcp-ddns.service
    exists: true
    filetype: symlink
    linked-to: /dev/null
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.4
      NIST800-53R5:
      - CM-7
      {{ end }}
    {{ end }}
  {{ end }}
{{ end }}
