---

{{ if .Vars.rhel10cis_level_1 }}
  {{ if .Vars.rhel10cis_rule_4_1_5 }}
    {{ if eq .Vars.rhel10cis_firewall "firewalld" }}
command:
  loopback_traffic_firewalld:
    title: 4.1.5 | Ensure firewalld loopback traffic is configured
    exec: firewall-cmd --list-all --zone="$(firewall-cmd --get-zone-of-interface=lo | xargs)" | grep -B 1 target
    exit-status:
      or:
      - 0
      - 1
    stdout:
      - 'trusted (active)'
      - '/(trusted|{{ .Vars.rhel10cis_active_firewall_zone }}) \(active\)/'
      - 'target: ACCEPT'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 4.1.5
      NIST800-53R5:
      - NA
    {{ end }}
  {{ end }}
{{ end }}
