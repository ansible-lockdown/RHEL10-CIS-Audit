---

{{ if .Vars.rhel10cis_level_1 }}
  {{ if .Vars.rhel10cis_rule_7_1_7 }}
file:
  etc_shadow-_perms:
    title: 7.1.7 | Ensure access to /etc/shadow- is configured
    path: /etc/shadow-
    exists: true
    mode: "0000"
    owner: root
    group: root
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 7.1.7
      NIST800-53R5:
      - AC-3
      - MP-2
  {{ end }}
{{ end }}
